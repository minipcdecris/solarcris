    }

        textoClima = "☁️ Nuboso";
    }
    else{
        textoClima = esNoche ? "Despejado" : "Soleado";
    }

    document.getElementById("weatherDesc").innerText = textoClima;
    document.getElementById("weatherCity").innerText = city;

     //calcularHorasConsumo(desc);

    const card = document.getElementById("weatherCard");

    card.classList.remove("weather-sun","weather-cloud","weather-rain","weather-night");

    if(desc.includes("lluvia")){
        card.classList.add("weather-rain");
    }
    else if(desc.includes("nube")){
        card.classList.add("weather-cloud");
    }
    else{
        if(esNoche){
            card.classList.add("weather-night");
        }else{
            card.classList.add("weather-sun");
        }
    }
}

// GUARDAMOS LOS DATOS DE ESTE MES TIENES EN LA BASE DE DATOS DIARIAMENTE
async function guardarMes(totalMes, tuParte){

    let mesActual = new Date().toISOString().slice(0,7) + "-01";

    // 🔥 borrar mes actual
    await supabaseClient
        .from('produccion')
        .delete()
        .eq('mes', mesActual);

    // 🔥 insertar nuevo dato (USANDO produccion ✔)
    await supabaseClient
        .from('produccion')
        .insert({
            mes: mesActual,
            reparto: tuParte,
            produccion: totalMes / 1000
        });

   // console.log("✅ guardado correcto");
}

function prediccionReal(kwhActual){

    let ahora = new Date();
    let hora = ahora.getHours();

    // horas solares aprox (ajústalo si quieres)
    let inicio = 8;
    let fin = 20;

    let horasTotales = fin - inicio;
    let horasPasadas = hora - inicio;

    if(horasPasadas <= 0) return;

    let porcentajeDia = horasPasadas / horasTotales;

    if(porcentajeDia <= 0) return;

    // 🔥 estimación real
    let estimadoFinal = kwhActual / porcentajeDia;

    let min = estimadoFinal * 0.9;
    let max = estimadoFinal * 1.1;

    document.getElementById("predTexto").innerText =
        `⚡ ${min.toFixed(0)} – ${max.toFixed(0)} kWh`;

    document.getElementById("predDetalle").innerText =
        "📊 Predicción real basada en producción actual";
}

function calcularDuracion(inicio, fin){

    if(inicio === "--" || fin === "--") return "--";

    let [h1, m1] = inicio.split(":").map(Number);
    let [h2, m2] = fin.split(":").map(Number);

    let inicioMin = h1 * 60 + m1;
    let finMin = h2 * 60 + m2;

    let diff = finMin - inicioMin;

    if(diff < 0) diff += 1440; // por si acaso

    let horas = Math.floor(diff / 60);
    let minutos = diff % 60;

    return `${horas}h ${minutos}m`;
}

function pintarGraficaHoras(mejorInicio, mejorFin, desc){

    desc = desc || "";

    const picoEl = document.getElementById("picoHora");

    let horas = [];
    let valores = [];

    let centro = (mejorInicio + mejorFin) / 2;

    let maxValor = 0;
    let indicePico = 0;

    // 🔥 GENERAR DATOS
    for(let h=8; h<=20; h++){

        horas.push(h);

        let valor;

        if(desc.toLowerCase().includes("lluvia")){
            valor = Math.random() * 2 + 0.5;
        }
        else if(desc.toLowerCase().includes("nube")){
            valor = Math.exp(-Math.pow((h - centro)/1.4, 2)) * 55;
        }
        else{
            valor = Math.exp(-Math.pow((h - centro)/1.6, 2)) * 130;
        }

        // 🔥 ajustar según potencia real
        if(potenciaActual < 200){
            valor *= 0.3;
        }

        valores.push(valor);

        if(valor > maxValor){
            maxValor = valor;
            indicePico = horas.length - 1;

{

async function cargarDatosMensuales(){

    const {data} = await supabaseClient
        .from('produccion')
        .select('*')
        .order('mes');

    let labels = [];
    let valores = [];

    data.forEach(d => {

        let f = new Date(d.mes);

        let mes = f.toLocaleDateString('es-ES',{month:'short'}).replace('.','');
        let año = f.getFullYear().toString().slice(-2);

        labels.push(mes + año);

        // 🔥 aseguramos número correcto
        valores.push(Number(d.reparto));
    });

    // 🔥 ACUMULADO AÑO (solo hasta mes actual)
    let hoy = new Date();
    let añoActual = hoy.getFullYear();
    let mesActual = hoy.getMonth();

    let acumulado = data
        .filter(d => {
            let fecha = new Date(d.mes);
            return fecha.getFullYear() === añoActual &&
                   fecha.getMonth() <= mesActual;
        })
        .reduce((sum, d) => sum + Number(d.reparto), 0);

    // 🔥 MOSTRAR EN PANTALLA
    let anioActualEl = document.getElementById("anioActualTexto");

    if(anioActualEl){
        anioActualEl.innerHTML = `⚡ Año en Curso: ${acumulado.toFixed(0)} kwh.`;
    }

    dibujarGraficaMensual(labels, valores);
}

// 🔥 PULL TO REFRESH (AQUÍ VA)
let startY = 0;
let pulling = false;

const loader = document.getElementById("loaderSolar");

document.addEventListener("touchstart", (e)=>{
    if(window.scrollY === 0){
        startY = e.touches[0].clientY;
        pulling = true;

        if(loader){
            loader.style.top = "0px";
            loader.style.opacity = "1";
        }
    }
}, { passive:true });

document.addEventListener("touchmove", (e)=>{

    if(!pulling) return;

    let currentY = e.touches[0].clientY;
    let diff = currentY - startY;

    if(diff > 0 && loader){
        loader.style.top = Math.min(diff, 80) + "px";
    }

}, { passive:true });

document.addEventListener("touchend", async (e)=>{

    if(!pulling) return;
    pulling = false;

    let endY = e.changedTouches[0].clientY;
    let diff = endY - startY;

    if(diff > 100){

        if(loader){
            loader.classList.add("show");
        }

        await tiempoReal();
        await graficaPotenciaReal();
        await grafica();
        await cargarTotales();
        await cargarDatosMensuales();
        await cargarTiempo();
    }

    if(loader){
        loader.classList.remove("show");
        loader.style.top = "-60px";
        loader.style.opacity = "0";
    }
});
